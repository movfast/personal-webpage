<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Telephone | Speech Translation Demo</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a1a2e;
  color: #e0e0e0;
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 800px;
  min-height: 600px;
  background: linear-gradient(145deg, #16213e, #1a1a2e);
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(108,99,255,0.1);
  padding: 32px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  position: relative;
  overflow: hidden;
}

.container::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, #6c63ff, transparent);
}

/* Header */
.header { text-align: center; }
.header h1 {
  font-size: 1.6rem;
  font-weight: 700;
  background: linear-gradient(135deg, #6c63ff, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}
.header p {
  font-size: 0.85rem;
  color: #8888aa;
}

/* Input Area */
.input-area {
  display: flex;
  gap: 10px;
  align-items: stretch;
}

.text-input {
  flex: 1;
  background: #0f0f23;
  border: 1px solid #2a2a4a;
  border-radius: 10px;
  padding: 12px 16px;
  color: #e0e0e0;
  font-size: 0.95rem;
  font-family: inherit;
  outline: none;
  transition: border-color 0.3s;
}
.text-input:focus { border-color: #6c63ff; }
.text-input::placeholder { color: #555577; }

.mic-btn, .go-btn {
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 600;
  font-size: 0.9rem;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  white-space: nowrap;
}

.mic-btn {
  background: #2a2a4a;
  color: #e0e0e0;
  width: 48px;
  min-width: 48px;
}
.mic-btn:hover { background: #3a3a5a; }
.mic-btn.recording {
  background: #ff4444;
  animation: pulse-mic 1s ease-in-out infinite;
}
.mic-btn.hidden { display: none; }

@keyframes pulse-mic {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.4); }
  50% { box-shadow: 0 0 0 10px rgba(255,68,68,0); }
}

.go-btn {
  background: #6c63ff;
  color: white;
  padding: 12px 20px;
}
.go-btn:hover { background: #5a52e0; transform: translateY(-1px); }
.go-btn:active { transform: translateY(0); }
.go-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Waveform */
.waveform-wrap {
  height: 40px;
  background: #0f0f23;
  border-radius: 8px;
  overflow: hidden;
  display: none;
}
.waveform-wrap.active { display: block; }
.waveform-wrap canvas { width: 100%; height: 100%; }

/* Presets */
.presets {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
}
.preset-btn {
  background: #0f0f23;
  border: 1px solid #2a2a4a;
  border-radius: 20px;
  padding: 6px 14px;
  color: #8888aa;
  font-size: 0.75rem;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.preset-btn:hover {
  border-color: #6c63ff;
  color: #c0c0e0;
  background: #1a1a3e;
}

/* Translation Chain */
.chain-section { flex: 1; min-height: 200px; }
.chain-section h2 {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #6c63ff;
  margin-bottom: 12px;
  text-align: center;
}

.chain-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  overflow-x: auto;
  padding: 10px 0;
  position: relative;
}

.chain-node {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  min-width: 90px;
  opacity: 0;
  transform: scale(0.7);
  transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
}
.chain-node.visible {
  opacity: 1;
  transform: scale(1);
}

.node-circle {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: #16213e;
  border: 2px solid #2a2a4a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  position: relative;
  transition: all 0.3s;
  cursor: pointer;
}
.node-circle:hover {
  border-color: #6c63ff;
  box-shadow: 0 0 20px rgba(108,99,255,0.3);
}
.node-circle.active {
  border-color: #6c63ff;
  box-shadow: 0 0 20px rgba(108,99,255,0.4);
  animation: node-glow 0.6s ease-out;
}
@keyframes node-glow {
  0% { box-shadow: 0 0 0 0 rgba(108,99,255,0.6); }
  100% { box-shadow: 0 0 20px rgba(108,99,255,0.4); }
}

.node-label {
  font-size: 0.65rem;
  font-weight: 600;
  color: #8888aa;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.node-text {
  font-size: 0.7rem;
  color: #c0c0e0;
  text-align: center;
  max-width: 100px;
  word-wrap: break-word;
  min-height: 2.4em;
  line-height: 1.2;
}

.listen-btn {
  background: none;
  border: 1px solid #2a2a4a;
  border-radius: 12px;
  padding: 2px 8px;
  color: #6c63ff;
  font-size: 0.6rem;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.listen-btn:hover {
  background: rgba(108,99,255,0.1);
  border-color: #6c63ff;
}

.chain-arrow {
  color: #2a2a4a;
  font-size: 1.2rem;
  margin: 0 2px;
  opacity: 0;
  transition: opacity 0.4s;
  align-self: flex-start;
  margin-top: 18px;
}
.chain-arrow.visible { opacity: 1; color: #6c63ff; }

/* Results */
.results {
  display: none;
  gap: 16px;
}
.results.visible { display: flex; flex-direction: column; }

.comparison {
  display: flex;
  gap: 12px;
}
.comparison-box {
  flex: 1;
  background: #0f0f23;
  border-radius: 10px;
  padding: 14px;
  border: 1px solid #2a2a4a;
}
.comparison-box h3 {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.comparison-box.original h3 { color: #6c63ff; }
.comparison-box.final h3 { color: #ff6b6b; }
.comparison-box p {
  font-size: 0.95rem;
  line-height: 1.5;
}
.comparison-box.final p { color: #ff6b6b; }

.diff-display {
  text-align: center;
  padding: 8px;
}
.drift-score {
  font-size: 0.8rem;
  color: #8888aa;
}
.drift-score span {
  color: #6c63ff;
  font-weight: 700;
  font-size: 1.1rem;
}

.play-again-btn {
  background: none;
  border: 1px solid #6c63ff;
  border-radius: 10px;
  padding: 10px 24px;
  color: #6c63ff;
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  align-self: center;
}
.play-again-btn:hover {
  background: rgba(108,99,255,0.1);
}

/* Status */
.status-msg {
  text-align: center;
  color: #555577;
  font-size: 0.8rem;
  min-height: 1.2em;
}

/* Back link */
.back-link {
  position: absolute;
  top: 16px;
  left: 20px;
  color: #6c63ff;
  text-decoration: none;
  font-size: 0.85rem;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.back-link:hover { opacity: 1; }

/* Responsive */
@media (max-width: 600px) {
  .container { padding: 20px 16px; min-height: auto; }
  .header h1 { font-size: 1.3rem; }
  .chain-container { flex-wrap: wrap; gap: 8px; }
  .chain-arrow { display: none; }
  .chain-node { min-width: 70px; }
  .node-circle { width: 44px; height: 44px; font-size: 1.2rem; }
  .comparison { flex-direction: column; }
  .input-area { flex-wrap: wrap; }
  .text-input { min-width: 100%; }
}
</style>
</head>
<body>

<div class="container">
  <a href="projects.html" class="back-link">&larr; Projects</a>

  <div class="header">
    <h1>Language Telephone</h1>
    <p>Watch how meaning drifts as a phrase travels through 5 languages</p>
  </div>

  <div class="input-area">
    <button class="mic-btn" id="micBtn" title="Record with microphone">&#127908;</button>
    <input type="text" class="text-input" id="textInput" placeholder="Type a phrase or pick one below..." maxlength="120">
    <button class="go-btn" id="goBtn">Translate &#10140;</button>
  </div>

  <div class="waveform-wrap" id="waveformWrap">
    <canvas id="waveformCanvas"></canvas>
  </div>

  <div class="presets">
    <button class="preset-btn" data-phrase="The quick brown fox jumps over the lazy dog">quick brown fox</button>
    <button class="preset-btn" data-phrase="I would like a cup of coffee please">cup of coffee</button>
    <button class="preset-btn" data-phrase="The weather is beautiful today">beautiful weather</button>
    <button class="preset-btn" data-phrase="Where is the nearest train station">train station</button>
    <button class="preset-btn" data-phrase="My cat likes to sleep on the keyboard">cat on keyboard</button>
  </div>

  <div class="chain-section">
    <h2>Translation Chain</h2>
    <div class="chain-container" id="chainContainer"></div>
  </div>

  <p class="status-msg" id="statusMsg">Enter a phrase and hit Translate to begin</p>

  <div class="results" id="results">
    <div class="comparison">
      <div class="comparison-box original">
        <h3>Original</h3>
        <p id="originalText"></p>
      </div>
      <div class="comparison-box final">
        <h3>After 5 Translations</h3>
        <p id="finalText"></p>
      </div>
    </div>
    <div class="diff-display">
      <div class="drift-score">Meaning drift: <span id="driftScore">0%</span></div>
    </div>
    <button class="play-again-btn" id="playAgainBtn">Try Another Phrase</button>
  </div>
</div>

  /* ===== TRANSLATION ENGINE ===== */
  function translateStep(text, dict) {
    // Sort keys by length (longest first) to match multi-word phrases first
    const keys = Object.keys(dict).sort((a, b) => b.length - a.length);
    let lower = text.toLowerCase();
    const result = [];
    let i = 0;

    while (i < lower.length) {
      let matched = false;
      for (const key of keys) {
        if (lower.startsWith(key, i)) {
          // Check word boundary
          const before = i === 0 || /\s/.test(lower[i - 1]);
          const after = (i + key.length >= lower.length) || /[\s.,!?;:]/.test(lower[i + key.length]);
          if (before && after) {
            result.push(dict[key]);
            i += key.length;
            matched = true;
            break;
          }
        }
      }
      if (!matched) {
        // Collect the whole word and apply drift
        if (/[a-zA-Z]/.test(lower[i])) {
          let word = '';
          const start = i;
          while (i < lower.length && /[a-zA-Z]/.test(lower[i])) {
            word += lower[i];
            i++;
          }
          result.push(applyDrift(word));
        } else {
          result.push(lower[i]);
          i++;
        }
      }
    }
    return result.join(' ').replace(/\s+/g, ' ').replace(/\s([.,!?;:])/g, '$1').trim();
  }

  function applyDrift(word) {
    // Humorous "false cognate" drift for unknown words
    if (word.length <= 2) return word;
    const drifts = [
      w => w.split('').reverse().join(''),
      w => w.slice(Math.floor(w.length/2)) + w.slice(0, Math.floor(w.length/2)),
      w => w[0] + w.slice(1).replace(/[aeiou]/g, c => ({a:'o',e:'a',i:'u',o:'e',u:'i'}[c] || c)),
      w => w + (w.endsWith('o') ? 'ni' : 'etto'),
      w => w.replace(/th/g,'z').replace(/sh/g,'ch').replace(/tion/g,'cion'),
    ];
    const fn = drifts[Math.abs(hashStr(word)) % drifts.length];
    return fn(word);
  }

  function hashStr(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
    return h;
  }

  function translateChain(phrase) {
    const steps = [phrase];
    let current = phrase;
    for (let i = 0; i < DICTS.length; i++) {
      current = translateStep(current, DICTS[i]);
      steps.push(current);
    }
    return steps;
  }

  /* ===== DRIFT SCORE ===== */
  function calcDrift(original, final) {
    const a = original.toLowerCase().split(/\s+/);
    const b = final.toLowerCase().split(/\s+/);
    const setA = new Set(a);
    const setB = new Set(b);
    let common = 0;
    for (const w of setA) if (setB.has(w)) common++;
    const total = Math.max(setA.size, setB.size, 1);
    return Math.round((1 - common / total) * 100);
  }

  const resultsDiv = document.getElementById('results');
  const originalText = document.getElementById('originalText');
  const finalText = document.getElementById('finalText');
  const driftScore = document.getElementById('driftScore');
  const playAgainBtn = document.getElementById('playAgainBtn');

  /* ===== SPEECH RECOGNITION ===== */
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  let audioCtx = null;
  let analyser = null;
  let animFrameId = null;
  let mediaStream = null;

  if (!SpeechRecognition) {
    micBtn.classList.add('hidden');
  } else {
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = true;
    recognition.continuous = false;

    recognition.onresult = (e) => {
      const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
      textInput.value = transcript;
    };
    recognition.onend = () => {
      micBtn.classList.remove('recording');
      stopWaveform();
    };
    recognition.onerror = () => {
      micBtn.classList.remove('recording');
      stopWaveform();
    };
  }

  micBtn.addEventListener('click', () => {
    if (!recognition) return;
    if (micBtn.classList.contains('recording')) {
      recognition.stop();
      return;
    }
    micBtn.classList.add('recording');
    recognition.start();
    startWaveform();
  });

  function startWaveform() {
    waveformWrap.classList.add('active');
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
      mediaStream = stream;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      const source = audioCtx.createMediaStreamSource(stream);
      source.connect(analyser);
      drawWaveform();
    }).catch(() => {
      waveformWrap.classList.remove('active');
    });
  }

  function drawWaveform() {
    if (!analyser) return;
    const canvas = waveformCanvas;
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth * 2;
    canvas.height = canvas.offsetHeight * 2;
    const bufLen = analyser.frequencyBinCount;
    const data = new Uint8Array(bufLen);

    function draw() {
      animFrameId = requestAnimationFrame(draw);
      analyser.getByteTimeDomainData(data);
      ctx.fillStyle = '#0f0f23';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#6c63ff';
      ctx.beginPath();
      const sliceW = canvas.width / bufLen;
      let x = 0;
      for (let i = 0; i < bufLen; i++) {
        const v = data[i] / 128.0;
        const y = (v * canvas.height) / 2;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
        x += sliceW;
      }
      ctx.lineTo(canvas.width, canvas.height / 2);
      ctx.stroke();
    }
    draw();
  }

  function stopWaveform() {
    if (animFrameId) cancelAnimationFrame(animFrameId);
    if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
    if (audioCtx) audioCtx.close().catch(() => {});
    audioCtx = null;
    analyser = null;
    mediaStream = null;
    waveformWrap.classList.remove('active');
  }

  /* ===== SPEECH SYNTHESIS ===== */
  function speak(text, langCode) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = langCode;
    utter.rate = 0.9;
    // Try to find a matching voice
    const voices = window.speechSynthesis.getVoices();
    const match = voices.find(v => v.lang.startsWith(langCode));
    if (match) utter.voice = match;
    window.speechSynthesis.speak(utter);
  }

  // Pre-load voices
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }

  /* ===== PRESETS ===== */
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      textInput.value = btn.dataset.phrase;
      textInput.focus();
    });
  });

  /* ===== RUN TRANSLATION ===== */
  let isRunning = false;

  goBtn.addEventListener('click', runTranslation);
  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') runTranslation();
  });

  async function runTranslation() {
    const phrase = textInput.value.trim();
    if (!phrase || isRunning) return;

    isRunning = true;
    goBtn.disabled = true;
    resultsDiv.classList.remove('visible');
    chainContainer.innerHTML = '';
    statusMsg.textContent = 'Translating...';

    const steps = translateChain(phrase);

    // Build chain nodes
    const nodes = [];
    for (let i = 0; i < LANGS.length; i++) {
      if (i > 0) {
        const arrow = document.createElement('div');
        arrow.className = 'chain-arrow';
        arrow.textContent = '\u2192';
        chainContainer.appendChild(arrow);
        nodes.push({ type: 'arrow', el: arrow });
      }

      const node = document.createElement('div');
      node.className = 'chain-node';

      const circle = document.createElement('div');
      circle.className = 'node-circle';
      circle.textContent = LANGS[i].flag;
      circle.title = 'Click to hear';

      const label = document.createElement('div');
      label.className = 'node-label';
      label.textContent = LANGS[i].label;

      const text = document.createElement('div');
      text.className = 'node-text';

      const listenBtn = document.createElement('button');
      listenBtn.className = 'listen-btn';
      listenBtn.textContent = '\uD83D\uDD0A Listen';

      const langVoice = LANGS[i].voice;
      const stepText = steps[i];

      const speakFn = () => speak(stepText, langVoice);
      circle.addEventListener('click', speakFn);
      listenBtn.addEventListener('click', speakFn);

      node.appendChild(circle);
      node.appendChild(label);
      node.appendChild(text);
      node.appendChild(listenBtn);
      chainContainer.appendChild(node);
      nodes.push({ type: 'node', el: node, circle, text, stepText, idx: i });
    }

    // Animate nodes appearing one by one
    for (const item of nodes) {
      await delay(300);
      if (item.type === 'arrow') {
        item.el.classList.add('visible');
      } else {
        item.el.classList.add('visible');
        item.circle.classList.add('active');
        // Typewriter effect for text
        await typewrite(item.text, item.stepText, 25);
        statusMsg.textContent = `${LANGS[item.idx].label}: "${item.stepText}"`;
      }
    }

    // Show results
    await delay(400);
    originalText.textContent = `"${steps[0]}"`;
    finalText.textContent = `"${steps[steps.length - 1]}"`;
    const drift = calcDrift(steps[0], steps[steps.length - 1]);
    driftScore.textContent = drift + '%';
    resultsDiv.classList.add('visible');
    statusMsg.textContent = 'Translation complete!';

    isRunning = false;
    goBtn.disabled = false;
  }

  function delay(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  async function typewrite(el, text, speed) {
    const truncated = text.length > 50 ? text.slice(0, 47) + '...' : text;
    el.textContent = '';
    for (let i = 0; i < truncated.length; i++) {
      el.textContent += truncated[i];
      await delay(speed);
    }
  }

  /* ===== PLAY AGAIN ===== */
  playAgainBtn.addEventListener('click', () => {
    resultsDiv.classList.remove('visible');
    chainContainer.innerHTML = '';
    textInput.value = '';
    textInput.focus();
    statusMsg.textContent = 'Enter a phrase and hit Translate to begin';
  });

})();
</script>
</body>
</html>
