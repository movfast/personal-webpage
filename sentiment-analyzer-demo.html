<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentiment Heatmap Analyzer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#1a1a2e;
  font-family:'Segoe UI',system-ui,sans-serif;
  color:#e0e0e0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:24px 12px;
}
.container{
  width:100%;
  max-width:800px;
  min-height:600px;
  background:#16213e;
  border-radius:16px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 40px rgba(108,99,255,0.1);
  overflow-y:auto;
  overflow-x:hidden;
  padding:28px 32px 24px;
}
h1{
  font-size:1.5rem;
  font-weight:700;
  color:#fff;
  margin-bottom:4px;
  display:flex;align-items:center;gap:10px;
}
h1 .accent{color:#6c63ff}
.subtitle{font-size:.82rem;color:#888;margin-bottom:16px}

/* Preset buttons */
.presets{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.presets button{
  background:#1a1a2e;
  border:1px solid #333;
  color:#ccc;
  padding:5px 12px;
  border-radius:20px;
  font-size:.75rem;
  cursor:pointer;
  transition:all .2s;
}
.presets button:hover{border-color:#6c63ff;color:#fff;background:#1f1f3a}
.presets button.active{border-color:#6c63ff;background:#6c63ff33;color:#fff}

/* Mode toggle */
.mode-toggle{
  display:flex;align-items:center;gap:8px;margin-bottom:14px;
}
.mode-toggle label{font-size:.8rem;color:#aaa;cursor:pointer}
.toggle-switch{
  position:relative;width:40px;height:22px;
}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{
  position:absolute;inset:0;background:#333;border-radius:11px;cursor:pointer;transition:.3s;
}
.toggle-slider::before{
  content:'';position:absolute;left:3px;top:3px;width:16px;height:16px;
  background:#888;border-radius:50%;transition:.3s;
}
.toggle-switch input:checked+.toggle-slider{background:#6c63ff55}
.toggle-switch input:checked+.toggle-slider::before{transform:translateX(18px);background:#6c63ff}

/* Main analysis area */
.analysis-area{display:flex;gap:16px;margin-bottom:16px}
.input-col,.output-col{flex:1;min-width:0}
.input-col textarea{
  width:100%;height:160px;
  background:#1a1a2e;
  border:1px solid #333;
  border-radius:10px;
  color:#e0e0e0;
  padding:12px;
  font-size:.88rem;
  line-height:1.5;
  resize:vertical;
  font-family:inherit;
  transition:border-color .2s;
}
.input-col textarea:focus{outline:none;border-color:#6c63ff}
.input-col textarea::placeholder{color:#555}
.col-label{font-size:.75rem;color:#777;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}

/* Heatmap output */
.heatmap-box{
  background:#1a1a2e;
  border:1px solid #333;
  border-radius:10px;
  padding:12px;
  min-height:160px;
  line-height:1.8;
  font-size:.88rem;
  overflow-y:auto;
  max-height:200px;
  position:relative;
}
.heatmap-box .word{
  display:inline-block;
  padding:2px 5px;
  margin:1px;
  border-radius:4px;
  cursor:pointer;
  transition:all .15s;
  position:relative;
}
.heatmap-box .word:hover{transform:scale(1.12);z-index:2}
.heatmap-box .placeholder{color:#555;font-style:italic}

/* Tooltip */
.word-tooltip{
  position:fixed;
  background:#0f0f23;
  border:1px solid #6c63ff;
  border-radius:8px;
  padding:8px 12px;
  font-size:.78rem;
  color:#e0e0e0;
  pointer-events:none;
  z-index:999;
  opacity:0;
  transition:opacity .15s;
  white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,.5);
}
.word-tooltip.visible{opacity:1}
.word-tooltip .score-val{color:#6c63ff;font-weight:700}
.word-tooltip .score-label{font-size:.7rem;color:#888}

/* Gauge + stats row */
.bottom-row{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap}
.gauge-container{flex:0 0 200px;text-align:center}
.gauge-container svg{display:block;margin:0 auto}
.gauge-label{font-size:.82rem;color:#aaa;margin-top:4px;font-weight:600}
.gauge-score{font-size:1.1rem;font-weight:700;color:#fff}

/* Stats panel */
.stats-panel{flex:1;min-width:180px}
.stats-panel h3{font-size:.82rem;color:#999;margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px}
.stat-row{
  display:flex;align-items:center;gap:8px;margin-bottom:6px;
}
.stat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.stat-bar-bg{
  flex:1;height:8px;background:#1a1a2e;border-radius:4px;overflow:hidden;
}
.stat-bar{
  height:100%;border-radius:4px;transition:width .4s ease;
}
.stat-label{font-size:.75rem;color:#aaa;width:60px}
.stat-count{font-size:.75rem;color:#ccc;width:28px;text-align:right}

/* Comparison mode */
.comparison-area{display:none;gap:16px}
.comparison-area.active{display:flex}
.compare-col{flex:1;min-width:0}
.compare-col textarea{
  width:100%;height:100px;
  background:#1a1a2e;border:1px solid #333;border-radius:10px;
  color:#e0e0e0;padding:10px;font-size:.85rem;line-height:1.4;
  resize:vertical;font-family:inherit;transition:border-color .2s;
}
.compare-col textarea:focus{outline:none;border-color:#6c63ff}
.compare-heatmap{
  background:#1a1a2e;border:1px solid #333;border-radius:10px;
  padding:10px;min-height:60px;max-height:120px;overflow-y:auto;
  line-height:1.7;font-size:.84rem;margin-top:8px;
}
.compare-heatmap .word{
  display:inline-block;padding:2px 4px;margin:1px;border-radius:4px;cursor:pointer;
  transition:all .15s;position:relative;
}
.compare-heatmap .word:hover{transform:scale(1.1);z-index:2}
.compare-bar-section{margin-top:10px}
.compare-stacked-bar{
  height:20px;border-radius:6px;overflow:hidden;display:flex;
  background:#1a1a2e;border:1px solid #333;
}
.compare-stacked-bar div{height:100%;transition:width .4s ease}
.compare-bar-label{font-size:.7rem;color:#777;margin-top:3px;display:flex;justify-content:space-between}
.compare-overall{font-size:.85rem;font-weight:600;margin-top:6px;text-align:center}

/* Responsive */
@media(max-width:700px){
  .container{padding:20px 16px}
  .analysis-area{flex-direction:column}
  .comparison-area{flex-direction:column}
  .bottom-row{flex-direction:column;align-items:center}
  .gauge-container{flex:none}
  h1{font-size:1.25rem}
}
@media(max-width:500px){
  .presets{gap:4px}
  .presets button{font-size:.7rem;padding:4px 9px}
}
</style>
</head>
<body class="botanical">

<div class="container">

  <!-- Comparison mode -->

      </div>
      <div class="compare-overall" id="compareOverallB">--</div>
    </div>
  </div>

    <div class="gauge-container">
      <svg width="180" height="110" viewBox="0 0 180 110">
        <defs>
          <linearGradient id="gaugeGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#ff4444"/>
            <stop offset="25%" stop-color="#ff8844"/>
            <stop offset="50%" stop-color="#888"/>
            <stop offset="75%" stop-color="#88cc44"/>
            <stop offset="100%" stop-color="#44cc44"/>
          </linearGradient>
        </defs>
        <path d="M 20 95 A 70 70 0 0 1 160 95" fill="none" stroke="#222" stroke-width="12" stroke-linecap="round"/>
        <path d="M 20 95 A 70 70 0 0 1 160 95" fill="none" stroke="url(#gaugeGrad)" stroke-width="12" stroke-linecap="round" opacity="0.3"/>
        <!-- needle -->
        <line id="gaugeNeedle" x1="90" y1="95" x2="90" y2="32" stroke="#6c63ff" stroke-width="3" stroke-linecap="round" style="transition:transform .6s cubic-bezier(.4,2,.3,1);transform-origin:90px 95px"/>
        <circle cx="90" cy="95" r="6" fill="#6c63ff"/>
        <!-- labels -->
        <text x="12" y="108" fill="#ff6666" font-size="8" font-family="inherit">Very Neg</text>
        <text x="128" y="108" fill="#66cc66" font-size="8" font-family="inherit">Very Pos</text>
      </svg>
      <div class="gauge-label" id="gaugeLabel">Neutral</div>
      <div class="gauge-score" id="gaugeScore">0.0</div>
    </div>
    <div class="stats-panel">
      <h3>Word Breakdown</h3>
      <div class="stat-row">
        <span class="stat-dot" style="background:#44cc44"></span>
        <span class="stat-label">Positive</span>
        <div class="stat-bar-bg"><div class="stat-bar" id="barPos" style="width:0;background:#44cc44"></div></div>
        <span class="stat-count" id="countPos">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-dot" style="background:#888"></span>
        <span class="stat-label">Neutral</span>
        <div class="stat-bar-bg"><div class="stat-bar" id="barNeu" style="width:0;background:#888"></div></div>
        <span class="stat-count" id="countNeu">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-dot" style="background:#ff4444"></span>
        <span class="stat-label">Negative</span>
        <div class="stat-bar-bg"><div class="stat-bar" id="barNeg" style="width:0;background:#ff4444"></div></div>
        <span class="stat-count" id="countNeg">0</span>
      </div>
    </div>
  </div>
</div>

const NEGATORS = new Set(['not','no','never','neither','nor','nobody','nothing','nowhere',
  'hardly','barely','scarcely','seldom','rarely',"don't","doesn't","didn't","won't",
  "wouldn't","shouldn't","couldn't","can't","cannot","isn't","aren't","wasn't","weren't",
  "haven't","hasn't","hadn't"]);

const INTENSIFIERS = {very:1.5,really:1.5,extremely:2,incredibly:1.8,absolutely:2,
  totally:1.5,completely:1.8,utterly:2,highly:1.5,super:1.5,truly:1.5,remarkably:1.5,
  exceptionally:1.8,especially:1.3,particularly:1.3,so:1.3,quite:1.2,rather:1.1,
  pretty:1.2,somewhat:0.8,slightly:0.6,barely:0.4,hardly:0.4,a_bit:0.7,a_little:0.7};

const DIMINISHERS = new Set(['somewhat','slightly','barely','hardly','a','bit','little','kind','sort','of']);

// Presets
const PRESETS = {

  '1star': "Terrible waste of money. Broke after two days. The worst product I've ever bought. Completely disappointed and frustrated.",
  'mixed': "The design is beautiful and sleek, but the battery life is disappointing. Good value for the price though.",

// ===== ANALYSIS ENGINE =====
function tokenize(text) {
  // Split into tokens preserving punctuation info
  return text.split(/(\s+)/).filter(t => t.length > 0);
}

function cleanWord(w) {
  return w.toLowerCase().replace(/[^a-z'-]/g, '');
}

function analyzeText(text) {
  if (!text.trim()) return { words: [], overall: 0, counts: {pos:0,neg:0,neu:0} };

  const tokens = tokenize(text);
  const results = [];
  let scoreSum = 0;
  let scoredCount = 0;
  let counts = {pos:0, neg:0, neu:0};

  // First pass: identify words and raw scores
  const wordData = [];
  for (const token of tokens) {
    const clean = cleanWord(token);
    if (!clean) {
      wordData.push({raw: token, clean: '', score: 0, isSpace: /^\s+$/.test(token)});
      continue;
    }
    const rawScore = LEX[clean] || 0;
    wordData.push({raw: token, clean, score: rawScore, isSpace: false});
  }

  // Second pass: apply negation and intensifiers
  for (let i = 0; i < wordData.length; i++) {
    const d = wordData[i];
    if (d.isSpace || !d.clean) {
      results.push({text: d.raw, score: 0, isSpace: true, clean: ''});
      continue;
    }

    let finalScore = d.score;

    // Check for negation in previous 1-3 content words
    let negated = false;
    let lookback = 0;
    for (let j = i - 1; j >= 0 && lookback < 3; j--) {
      if (wordData[j].isSpace || !wordData[j].clean) continue;
      lookback++;
      if (NEGATORS.has(wordData[j].clean)) {
        negated = true;
        break;
      }
    }
    if (negated && finalScore !== 0) {
      finalScore = -finalScore * 0.75;
    }

    // Check for intensifier in previous content word
    let prevClean = '';
    for (let j = i - 1; j >= 0; j--) {
      if (wordData[j].clean) { prevClean = wordData[j].clean; break; }
    }
    if (INTENSIFIERS[prevClean] && finalScore !== 0) {
      finalScore *= INTENSIFIERS[prevClean];
    }

    // Clamp to [-5, 5]
    finalScore = Math.max(-5, Math.min(5, finalScore));

    if (finalScore > 0.5) counts.pos++;
    else if (finalScore < -0.5) counts.neg++;
    else counts.neu++;

    scoreSum += finalScore;
    scoredCount++;

    results.push({text: d.raw, score: finalScore, isSpace: false, clean: d.clean});
  }

  const overall = scoredCount > 0 ? scoreSum / scoredCount : 0;
  return {words: results, overall, counts};
}

// ===== RENDERING =====
function scoreToColor(score) {
  // Map score (-5 to 5) to color
  if (Math.abs(score) < 0.3) return 'rgba(150,150,150,0.3)';

  const t = Math.min(Math.abs(score) / 5, 1);
  const alpha = 0.25 + t * 0.55;

  if (score > 0) {
    // Green spectrum
    if (t > 0.6) return `rgba(68,204,68,${alpha})`; // #44cc44
    if (t > 0.3) return `rgba(136,204,68,${alpha})`; // #88cc44
    return `rgba(136,204,68,${alpha * 0.7})`;
  } else {
    // Red spectrum
    if (t > 0.6) return `rgba(255,68,68,${alpha})`; // #ff4444
    if (t > 0.3) return `rgba(255,136,68,${alpha})`; // #ff8844
    return `rgba(255,136,68,${alpha * 0.7})`;
  }
}

function scoreToTextColor(score) {
  if (Math.abs(score) < 0.3) return '#aaa';
  if (score > 0) return score > 2.5 ? '#44cc44' : '#88cc44';
  return score < -2.5 ? '#ff4444' : '#ff8844';
}

function renderHeatmap(container, words) {
  container.innerHTML = '';
  if (words.length === 0) {
    container.innerHTML = '<span class="placeholder">Words will appear here with sentiment coloring...</span>';
    return;
  }

  for (const w of words) {
    if (w.isSpace) {
      container.appendChild(document.createTextNode(w.text));
      continue;
    }
    const span = document.createElement('span');
    span.className = 'word';
    span.textContent = w.text;
    span.style.background = scoreToColor(w.score);
    span.style.color = scoreToTextColor(w.score);
    span.dataset.score = w.score.toFixed(2);
    span.dataset.clean = w.clean;
    container.appendChild(span);
  }
}

function updateGauge(overall) {
  const needle = document.getElementById('gaugeNeedle');
  // Map overall from [-5,5] to [-90,90] degrees
  const angle = (overall / 5) * 85;
  needle.style.transform = `rotate(${angle}deg)`;

  const label = document.getElementById('gaugeLabel');
  const scoreEl = document.getElementById('gaugeScore');
  scoreEl.textContent = overall.toFixed(2);

  if (overall > 2) label.textContent = 'Very Positive';
  else if (overall > 0.5) label.textContent = 'Positive';
  else if (overall > -0.5) label.textContent = 'Neutral';
  else if (overall > -2) label.textContent = 'Negative';
  else label.textContent = 'Very Negative';

  label.style.color = scoreToTextColor(overall);
}

function updateStats(counts) {
  const total = counts.pos + counts.neg + counts.neu || 1;
  document.getElementById('barPos').style.width = (counts.pos / total * 100) + '%';
  document.getElementById('barNeu').style.width = (counts.neu / total * 100) + '%';
  document.getElementById('barNeg').style.width = (counts.neg / total * 100) + '%';
  document.getElementById('countPos').textContent = counts.pos;
  document.getElementById('countNeu').textContent = counts.neu;
  document.getElementById('countNeg').textContent = counts.neg;
}

// ===== TOOLTIP =====
const tooltip = document.getElementById('tooltip');
function showTooltip(e, word) {
  const score = parseFloat(word.dataset.score);
  const label = score > 0.5 ? 'Positive' : score < -0.5 ? 'Negative' : 'Neutral';
  tooltip.innerHTML = `<strong>${word.dataset.clean}</strong><br><span class="score-label">${label}</span> <span class="score-val">${score > 0 ? '+' : ''}${score.toFixed(2)}</span>`;
  tooltip.classList.add('visible');
  const rect = word.getBoundingClientRect();
  tooltip.style.left = (rect.left + rect.width/2 - tooltip.offsetWidth/2) + 'px';
  tooltip.style.top = (rect.top - tooltip.offsetHeight - 8) + 'px';
}

document.addEventListener('click', function(e) {
  const word = e.target.closest('.word');
  if (word && word.dataset.score !== undefined) {
    showTooltip(e, word);
    setTimeout(() => tooltip.classList.remove('visible'), 2000);
  } else {
    tooltip.classList.remove('visible');
  }
});

        else {
          const b = document.getElementById('compareInputB');

          b.dispatchEvent(new Event('input'));
        }
      }
    }
  });

const singleMode = document.getElementById('singleMode');

compareToggle.addEventListener('change', function() {
  if (this.checked) {
    singleMode.style.display = 'none';
    compareMode.classList.add('active');
  } else {
    singleMode.style.display = 'flex';
    compareMode.classList.remove('active');
  }
});

function renderCompareBar(barEl, counts) {
  const total = counts.pos + counts.neg + counts.neu || 1;
  const negPct = (counts.neg / total * 100);
  const neuPct = (counts.neu / total * 100);
  const posPct = (counts.pos / total * 100);
  barEl.innerHTML = `<div style="width:${negPct}%;background:#ff4444"></div><div style="width:${neuPct}%;background:#555"></div><div style="width:${posPct}%;background:#44cc44"></div>`;
}

function overallLabel(score) {
  let label, color;
  if (score > 2) { label = 'Very Positive'; color = '#44cc44'; }
  else if (score > 0.5) { label = 'Positive'; color = '#88cc44'; }
  else if (score > -0.5) { label = 'Neutral'; color = '#aaa'; }
  else if (score > -2) { label = 'Negative'; color = '#ff8844'; }
  else { label = 'Very Negative'; color = '#ff4444'; }
  return `<span style="color:${color}">${label} (${score > 0 ? '+' : ''}${score.toFixed(2)})</span>`;
}

['A','B'].forEach(side => {
  const input = document.getElementById('compareInput' + side);
  const heatmap = document.getElementById('compareHeatmap' + side);
  const bar = document.getElementById('compareBar' + side);
  const overall = document.getElementById('compareOverall' + side);

  let timeout;
  input.addEventListener('input', function() {
    clearTimeout(timeout);
    timeout = setTimeout(() => {
      const result = analyzeText(input.value);
      renderHeatmap(heatmap, result.words);
      renderCompareBar(bar, result.counts);
      overall.innerHTML = input.value.trim() ? overallLabel(result.overall) : '--';
    }, 100);
  });
});
