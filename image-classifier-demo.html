<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draw &amp; Classify — Neural Network Demo</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a1a2e;
  color: #e0e0e0;
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 1100px;
  background: #1a1a40;
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(108,99,255,0.1);
  padding: 28px 32px 32px;
  overflow: hidden;
}

header {
  text-align: center;
  margin-bottom: 20px;
}

header h1 {
  font-size: 1.55rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.02em;
}

header h1 span { color: #6c63ff; }

header p {
  font-size: 0.82rem;
  color: #888;
  margin-top: 4px;
}

.main-grid {
  display: grid;
  grid-template-columns: 280px 1fr 220px;
  gap: 24px;
  align-items: start;
}

/* ----- Drawing Panel ----- */
.draw-panel { display: flex; flex-direction: column; gap: 12px; }

.canvas-wrap {
  position: relative;
  width: 280px;
  height: 280px;
  border-radius: 12px;
  overflow: hidden;
  border: 2px solid #2a2a5a;
  cursor: crosshair;
  background: #000;
}

#drawCanvas { display: block; width: 280px; height: 280px; touch-action: none; }

.controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

.btn {
  padding: 6px 14px;
  border: none;
  border-radius: 8px;
  background: #2a2a5a;
  color: #ccc;
  font-size: 0.78rem;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
  font-family: inherit;
}

.btn:hover { background: #6c63ff; color: #fff; }
.btn.active { background: #6c63ff; color: #fff; }

.brush-group {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.72rem;
  color: #888;
}

.brush-group input[type="range"] {
  width: 72px;
  accent-color: #6c63ff;
}

.gallery-label {
  font-size: 0.72rem;
  color: #777;
  margin-top: 4px;
}

.gallery {
  display: flex;
  gap: 6px;
}

.gallery canvas {
  width: 48px;
  height: 48px;
  border-radius: 6px;
  border: 1.5px solid #2a2a5a;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.15s;
  background: #000;
}

.gallery canvas:hover {
  border-color: #6c63ff;
  transform: scale(1.08);
}

/* ----- Network Viz ----- */
.network-panel {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 380px;
}

#networkCanvas { display: block; width: 100%; height: 380px; }

/* ----- Probability Bars ----- */
.prob-panel { display: flex; flex-direction: column; gap: 6px; }

.prob-panel h3 {
  font-size: 0.82rem;
  color: #aaa;
  margin-bottom: 4px;
  text-align: center;
}

.prob-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.prob-label {
  width: 18px;
  text-align: right;
  font-size: 0.82rem;
  font-weight: 600;
  color: #bbb;
}

.prob-bar-bg {
  flex: 1;
  height: 18px;
  background: #2a2a5a;
  border-radius: 6px;
  overflow: hidden;
  position: relative;
}

.prob-bar-fill {
  height: 100%;
  border-radius: 6px;
  background: linear-gradient(90deg, #6c63ff, #a78bfa);
  width: 0%;
  transition: width 0.18s ease;
}

.prob-value {
  width: 38px;
  font-size: 0.72rem;
  color: #888;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.predicted-label {
  text-align: center;
  margin-top: 10px;
  font-size: 1.3rem;
  font-weight: 700;
  color: #6c63ff;
  min-height: 2em;
}

/* ----- Responsive ----- */
@media (max-width: 900px) {
  .main-grid {
    grid-template-columns: 1fr;
    justify-items: center;
  }
  .network-panel { width: 100%; min-height: 260px; }
  #networkCanvas { height: 260px; }
  .prob-panel { width: 280px; }
}

@media (max-width: 400px) {
  .container { padding: 16px; }
  .canvas-wrap, #drawCanvas { width: 240px; height: 240px; }
}
</style>
</head>
<body class="botanical">

<div class="container">
  <header>
    <h1>Draw &amp; <span>Classify</span></h1>
    <p>Sketch a digit (0-9) and watch a tiny neural network think in real time</p>
  </header>

  <div id="loadingOverlay" style="text-align:center;padding:3rem;color:#6c63ff;font-size:1.1rem;">
    <div style="margin-bottom:1rem;">Training neural network on MNIST data...</div>
    <div style="width:200px;height:4px;background:#2a2a5a;border-radius:2px;margin:0 auto;overflow:hidden;">
      <div id="trainProgress" style="width:0%;height:100%;background:#6c63ff;transition:width 0.3s;"></div>
    </div>
    <div id="trainStatus" style="font-size:0.8rem;color:#888;margin-top:0.5rem;">Loading TF.js...</div>
  </div>
  <div class="main-grid" id="mainGrid" style="display:none;">
    <!-- Left: Drawing -->
    <div class="draw-panel">
      <div class="canvas-wrap">
        <canvas id="drawCanvas" width="280" height="280"></canvas>
      </div>
      <div class="controls">
        <button class="btn" id="clearBtn">Clear</button>
        <button class="btn active" id="penBtn">Pen</button>
        <button class="btn" id="eraserBtn">Eraser</button>
        <div class="brush-group">
          Brush
          <input type="range" id="brushSize" min="8" max="28" value="16">
        </div>
      </div>
      <div class="gallery-label">Try an example:</div>
      <div class="gallery" id="gallery"></div>
    </div>

    <!-- Center: Network Diagram -->
    <div class="network-panel">
      <canvas id="networkCanvas"></canvas>
    </div>

    <!-- Right: Probabilities -->
    <div class="prob-panel">
      <h3>Prediction</h3>
      <div id="probBars"></div>
      <div class="predicted-label" id="predictedLabel">Draw something!</div>
    </div>
  </div>
</div>

<script src="js/mnist_data.js"></script>
<script>
// =====================================================================
//  TF.js MNIST Classifier — trained on page load
// =====================================================================

function zerosArray(n) { return new Float32Array(n); }

let hiddenAct = zerosArray(64);
let outputAct = zerosArray(10);
let model = null;
let hiddenModel = null;
let modelReady = false;

// --- Train TF.js model on embedded MNIST data ---
async function trainModel() {
  const status = document.getElementById('trainStatus');
  const progress = document.getElementById('trainProgress');

  status.textContent = 'Decoding MNIST data...';
  const raw = Uint8Array.from(atob(MNIST_B64), c => c.charCodeAt(0));
  const N = MNIST_N;
  const labels = raw.slice(0, N);
  const pixels = raw.slice(N);

  // Build tensors
  const xData = new Float32Array(N * 784);
  for (let i = 0; i < N * 784; i++) xData[i] = pixels[i] / 255.0;
  const xs = tf.tensor2d(xData, [N, 784]);
  const ys = tf.oneHot(tf.tensor1d(Array.from(labels), 'int32'), 10).toFloat();

  status.textContent = 'Building model...';

  model = tf.sequential();
  model.add(tf.layers.dense({ inputShape: [784], units: 128, activation: 'relu' }));
  model.add(tf.layers.dropout({ rate: 0.2 }));
  model.add(tf.layers.dense({ units: 64, activation: 'relu' }));
  model.add(tf.layers.dense({ units: 10, activation: 'softmax' }));
  model.compile({ optimizer: tf.train.adam(0.003), loss: 'categoricalCrossentropy', metrics: ['accuracy'] });

  const totalEpochs = 15;
  status.textContent = 'Training... epoch 0/' + totalEpochs;

  await model.fit(xs, ys, {
    epochs: totalEpochs,
    batchSize: 32,
    shuffle: true,
    callbacks: {
      onEpochEnd: (epoch, logs) => {
        const pct = ((epoch + 1) / totalEpochs * 100).toFixed(0);
        progress.style.width = pct + '%';
        status.textContent = 'Training... epoch ' + (epoch+1) + '/' + totalEpochs +
          ' — acc: ' + (logs.acc * 100).toFixed(1) + '%';
      }
    }
  });

  // Create hidden layer model for visualization
  hiddenModel = tf.model({ inputs: model.input, outputs: model.layers[0].output });

  xs.dispose(); ys.dispose();

  // Show main UI
  document.getElementById('loadingOverlay').style.display = 'none';
  document.getElementById('mainGrid').style.display = '';
  modelReady = true;
  resizeNetCanvas();
  status.textContent = 'Ready!';
}

/* Old template code removed — forward() now uses TF.js model */
if (false) { // dead code block
  const big = document.createElement('canvas');
  big.width = 280; big.height = 280;
  const bctx = big.getContext('2d');

  const sm = document.createElement('canvas');
  sm.width = 28; sm.height = 28;
  const sctx = sm.getContext('2d', { willReadFrequently: true });

  function strokePath(points, lineW) {
    bctx.fillStyle = '#000';
    bctx.fillRect(0, 0, 280, 280);
    bctx.strokeStyle = '#fff';
    bctx.lineWidth = lineW;
    bctx.lineCap = 'round';
    bctx.lineJoin = 'round';
    bctx.beginPath();
    bctx.moveTo(points[0][0], points[0][1]);
    for (let i = 1; i < points.length; i++) bctx.lineTo(points[i][0], points[i][1]);
    bctx.stroke();
    // Downsample
    sctx.clearRect(0, 0, 28, 28);
    sctx.drawImage(big, 0, 0, 28, 28);
    const imgData = sctx.getImageData(0, 0, 28, 28);
    const px = new Float32Array(784);
    for (let i = 0; i < 784; i++) px[i] = imgData.data[i*4] / 255.0;
    return px;
  }

  // Digit paths drawn at 280x280 scale, multiple variants per digit
  // Each variant: array of stroke point arrays + line width
  const digitPaths = {
    0: [
      // Oval
      {pts:[[140,40],[200,60],[220,140],[200,220],[140,240],[80,220],[60,140],[80,60],[140,40]], w:20},
      // Rounder
      {pts:[[140,30],[210,70],[230,140],[210,210],[140,250],[70,210],[50,140],[70,70],[140,30]], w:24},
      // Narrow
      {pts:[[140,50],[180,70],[190,140],[180,210],[140,230],[100,210],[90,140],[100,70],[140,50]], w:18},
    ],
    1: [
      // Straight
      {pts:[[140,40],[140,240]], w:20},
      // With top serif
      {pts:[[110,60],[140,40],[140,240]], w:20},
      // With base
      {pts:[[120,60],[140,40],[140,240],[100,240],[180,240]], w:18},
    ],
    2: [
      // Classic: top curve, diagonal, bottom bar
      {pts:[[80,80],[100,50],[160,40],[200,60],[210,100],[180,140],[80,220],[80,240],[210,240]], w:20},
      // Angular
      {pts:[[70,60],[200,60],[200,140],[70,140],[70,240],[200,240]], w:20},
      // Curvy
      {pts:[[80,70],[140,40],[200,70],[200,120],[140,160],[80,200],[80,240],[200,240]], w:18},
    ],
    3: [
      // Classic: two bumps right
      {pts:[[80,50],[200,50],[200,130],[140,140],[200,150],[200,230],[80,240]], w:20},
      // Angular
      {pts:[[70,60],[200,60],[200,140],[100,140],[200,140],[200,240],[70,240]], w:20},
      // Rounded
      {pts:[[80,60],[180,40],[210,90],[170,140],[210,190],[180,240],[80,240]], w:18},
    ],
    4: [
      // Classic: down-left, across, down-right
      {pts:[[180,40],[60,170],[220,170]], w:20},
      {pts:[[180,40],[180,240]], w:20}, // separate vertical stroke added below
      // Angular
      {pts:[[160,30],[60,160],[230,160]], w:20},
      {pts:[[160,30],[160,250]], w:18},
    ],
    5: [
      // Classic: top bar, down left, across mid, down right curve, bottom bar
      {pts:[[200,50],[80,50],[80,140],[180,140],[210,180],[200,230],[100,240]], w:20},
      // Angular
      {pts:[[200,60],[80,60],[80,140],[200,140],[200,240],[80,240]], w:20},
      // Curvy
      {pts:[[190,50],[90,50],[80,60],[80,140],[150,130],[200,170],[200,220],[150,250],[80,240]], w:18},
    ],
    6: [
      // Classic: top curve down left, bottom loop
      {pts:[[180,60],[140,40],[80,80],[60,160],[80,230],[140,250],[200,220],[200,170],[140,140],[80,160]], w:20},
      // Angular
      {pts:[[190,60],[80,60],[60,140],[60,240],[200,240],[200,140],[60,140]], w:20},
      // Round
      {pts:[[170,50],[100,50],[70,100],[60,180],[80,230],[140,250],[200,230],[210,180],[160,140],[80,160]], w:18},
    ],
    7: [
      // Classic: top bar, diagonal down
      {pts:[[60,50],[220,50],[130,250]], w:22},
      // With crossbar
      {pts:[[60,50],[220,50],[140,250]], w:20},
      // Steep
      {pts:[[60,40],[220,40],[160,250]], w:18},
    ],
    8: [
      // Two loops
      {pts:[[140,40],[200,60],[200,120],[140,140],[80,120],[80,60],[140,40]], w:20},
      {pts:[[140,140],[200,160],[210,210],[140,250],[70,210],[60,160],[140,140]], w:20},
      // Figure 8
      {pts:[[140,30],[200,60],[200,110],[140,140],[80,170],[60,210],[80,240],[140,260],[200,240],[220,210],[200,170],[140,140],[80,110],[60,60],[80,40],[140,30]], w:18},
    ],
    9: [
      // Classic: top loop, down right
      {pts:[[200,140],[200,70],[140,40],[80,70],[80,130],[140,150],[200,130],[200,250]], w:20},
      // Angular
      {pts:[[200,140],[200,60],[80,60],[80,140],[200,140],[200,240]], w:20},
      // Round
      {pts:[[190,140],[200,80],[160,40],[100,50],[70,90],[80,130],[140,150],[200,130],[200,240],[140,250]], w:18},
    ]
  };

  // Special handling for 4 (two separate strokes) and 8 (two loops)
  function renderDigit(pathData) {
    bctx.fillStyle = '#000';
    bctx.fillRect(0, 0, 280, 280);
    if (Array.isArray(pathData)) {
      // Multiple stroke groups
      for (const group of pathData) {
        bctx.strokeStyle = '#fff';
        bctx.lineWidth = group.w;
        bctx.lineCap = 'round';
        bctx.lineJoin = 'round';
        bctx.beginPath();
        bctx.moveTo(group.pts[0][0], group.pts[0][1]);
        for (let i = 1; i < group.pts.length; i++) bctx.lineTo(group.pts[i][0], group.pts[i][1]);
        bctx.stroke();
      }
    } else {
      bctx.strokeStyle = '#fff';
      bctx.lineWidth = pathData.w;
      bctx.lineCap = 'round';
      bctx.lineJoin = 'round';
      bctx.beginPath();
      bctx.moveTo(pathData.pts[0][0], pathData.pts[0][1]);
      for (let i = 1; i < pathData.pts.length; i++) bctx.lineTo(pathData.pts[i][0], pathData.pts[i][1]);
      bctx.stroke();
    }
    sctx.clearRect(0, 0, 28, 28);
    sctx.drawImage(big, 0, 0, 28, 28);
    const imgData = sctx.getImageData(0, 0, 28, 28);
    const px = new Float32Array(784);
    for (let i = 0; i < 784; i++) px[i] = imgData.data[i*4] / 255.0;
    return px;
  }

  let tIdx = 0;
  for (let d = 0; d < 10; d++) {
    const paths = digitPaths[d];
    // Group paths into variants
    let variants;
    if (d === 4) {
      // 4 has pairs of strokes
      variants = [
        [{ pts: paths[0].pts, w: paths[0].w }, { pts: [[180,40],[180,240]], w: 20 }],
        [{ pts: paths[2].pts, w: paths[2].w }, { pts: [[160,30],[160,250]], w: 18 }],
      ];
    } else if (d === 8 && paths.length >= 3) {
      variants = [
        [paths[0], paths[1]],  // two separate loops
        paths[2],               // single figure-8 path
      ];
    } else {
      variants = paths;
    }

    for (const v of variants) {
      const px = renderDigit(v);
      digitTemplates.push({ digit: d, pixels: px });
      if (tIdx < 64) {
        for (let i = 0; i < 784; i++) W1[tIdx*784+i] = px[i];
        W2[d * 64 + tIdx] = 1.0;
        tIdx++;
      }
    }
  }
}

function forward(input) {
  if (!modelReady || !model) return outputAct;

  const tensor = tf.tensor2d(input, [1, 784]);

  // Get output probabilities
  const pred = model.predict(tensor);
  const probs = pred.dataSync();
  for (let i = 0; i < 10; i++) outputAct[i] = probs[i];

  // Get hidden layer activations for visualization
  if (hiddenModel) {
    const hidden = hiddenModel.predict(tensor);
    const hData = hidden.dataSync();
    // Map 128 hidden neurons down to 64 for visualization (take top 64 by activation)
    const indexed = Array.from(hData).map((v, i) => ({ v, i }));
    indexed.sort((a, b) => b.v - a.v);
    hiddenAct.fill(0);
    for (let i = 0; i < 64; i++) hiddenAct[i] = indexed[i].v;
    hidden.dispose();
  }

  tensor.dispose();
  pred.dispose();
  return outputAct;
}

// =====================================================================
//  Drawing Canvas
// =====================================================================
const drawCanvas = document.getElementById('drawCanvas');
const drawCtx = drawCanvas.getContext('2d');
drawCtx.fillStyle = '#000';
drawCtx.fillRect(0, 0, 280, 280);
drawCtx.lineCap = 'round';
drawCtx.lineJoin = 'round';

let isDrawing = false;
let isEraser = false;
let brushRadius = 16;
let lastX = null, lastY = null;
let hasDrawn = false;

function setStroke() {
  drawCtx.strokeStyle = isEraser ? '#000000' : '#ffffff';
  drawCtx.lineWidth = brushRadius;
}
setStroke();

function getPos(e) {
  const rect = drawCanvas.getBoundingClientRect();
  const scaleX = 280 / rect.width;
  const scaleY = 280 / rect.height;
  if (e.touches) {
    return [
      (e.touches[0].clientX - rect.left) * scaleX,
      (e.touches[0].clientY - rect.top) * scaleY
    ];
  }
  return [(e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY];
}

function startDraw(e) {
  e.preventDefault();
  isDrawing = true;
  const [x, y] = getPos(e);
  lastX = x; lastY = y;
  // Draw a dot
  drawCtx.beginPath();
  drawCtx.arc(x, y, brushRadius / 2, 0, Math.PI * 2);
  drawCtx.fillStyle = isEraser ? '#000' : '#fff';
  drawCtx.fill();
  hasDrawn = true;
  scheduleClassify();
}

function moveDraw(e) {
  if (!isDrawing) return;
  e.preventDefault();
  const [x, y] = getPos(e);
  setStroke();
  drawCtx.beginPath();
  drawCtx.moveTo(lastX, lastY);
  drawCtx.lineTo(x, y);
  drawCtx.stroke();
  lastX = x; lastY = y;
  hasDrawn = true;
  scheduleClassify();
}

function stopDraw() { isDrawing = false; lastX = null; lastY = null; }

drawCanvas.addEventListener('mousedown', startDraw);
drawCanvas.addEventListener('mousemove', moveDraw);
drawCanvas.addEventListener('mouseup', stopDraw);
drawCanvas.addEventListener('mouseleave', stopDraw);
drawCanvas.addEventListener('touchstart', startDraw, { passive: false });
drawCanvas.addEventListener('touchmove', moveDraw, { passive: false });
drawCanvas.addEventListener('touchend', stopDraw);

// Controls
document.getElementById('clearBtn').addEventListener('click', () => {
  drawCtx.fillStyle = '#000';
  drawCtx.fillRect(0, 0, 280, 280);
  hasDrawn = false;
  outputAct.fill(0.1);
  hiddenAct.fill(0);
  updateProbBars();
  drawNetwork();
  document.getElementById('predictedLabel').textContent = 'Draw something!';
});

const eraserBtn = document.getElementById('eraserBtn');
const penBtn = document.getElementById('penBtn');
eraserBtn.addEventListener('click', () => {
  isEraser = true;
  eraserBtn.classList.add('active');
  penBtn.classList.remove('active');
  drawCanvas.style.cursor = 'cell';
});
penBtn.addEventListener('click', () => {
  isEraser = false;
  penBtn.classList.add('active');
  eraserBtn.classList.remove('active');
  drawCanvas.style.cursor = 'crosshair';
});

document.getElementById('brushSize').addEventListener('input', (e) => {
  brushRadius = parseInt(e.target.value);
});

// =====================================================================
//  Downsample & Classify
// =====================================================================
let classifyTimer = null;
function scheduleClassify() {
  if (classifyTimer) return;
  classifyTimer = requestAnimationFrame(() => {
    classifyTimer = null;
    classify();
  });
}

const smallCanvas = document.createElement('canvas');
smallCanvas.width = 28; smallCanvas.height = 28;
const smallCtx = smallCanvas.getContext('2d', { willReadFrequently: true });

function classify() {
  if (!hasDrawn || !modelReady) return;
  smallCtx.clearRect(0, 0, 28, 28);
  smallCtx.drawImage(drawCanvas, 0, 0, 28, 28);
  const imgData = smallCtx.getImageData(0, 0, 28, 28);
  const input = new Float32Array(784);
  for (let i = 0; i < 784; i++) {
    input[i] = imgData.data[i * 4] / 255.0; // red channel (grayscale)
  }
  forward(input);
  updateProbBars();
  drawNetwork();
}

// =====================================================================
//  Probability Bars
// =====================================================================
const probBarsEl = document.getElementById('probBars');
(function buildBars() {
  for (let i = 0; i < 10; i++) {
    const row = document.createElement('div');
    row.className = 'prob-row';
    row.innerHTML =
      `<span class="prob-label">${i}</span>` +
      `<div class="prob-bar-bg"><div class="prob-bar-fill" id="bar${i}"></div></div>` +
      `<span class="prob-value" id="val${i}">0%</span>`;
    probBarsEl.appendChild(row);
  }
})();

function updateProbBars() {
  let maxIdx = 0, maxP = 0;
  for (let i = 0; i < 10; i++) {
    const p = outputAct[i] || 0;
    document.getElementById('bar' + i).style.width = (p * 100).toFixed(1) + '%';
    document.getElementById('val' + i).textContent = (p * 100).toFixed(1) + '%';
    if (p > maxP) { maxP = p; maxIdx = i; }

    // Highlight the top prediction bar
    const fill = document.getElementById('bar' + i);
    if (p === maxP) {
      fill.style.background = 'linear-gradient(90deg, #6c63ff, #a78bfa)';
    } else {
      fill.style.background = 'linear-gradient(90deg, #3d3874, #5a4f99)';
    }
  }
  // Re-highlight the actual max
  for (let i = 0; i < 10; i++) {
    const fill = document.getElementById('bar' + i);
    fill.style.background = (i === maxIdx)
      ? 'linear-gradient(90deg, #6c63ff, #a78bfa)'
      : 'linear-gradient(90deg, #3d3874, #5a4f99)';
  }

  const label = document.getElementById('predictedLabel');
  if (hasDrawn) {
    label.textContent = `Prediction: ${maxIdx}`;
    label.style.color = '#6c63ff';
  }
}

// =====================================================================
//  Network Visualization (Canvas)
// =====================================================================
const netCanvas = document.getElementById('networkCanvas');
const netCtx = netCanvas.getContext('2d');
let netW, netH;

function resizeNetCanvas() {
  const rect = netCanvas.parentElement.getBoundingClientRect();
  netCanvas.width = rect.width * devicePixelRatio;
  netCanvas.height = rect.height * devicePixelRatio;
  netW = rect.width;
  netH = rect.height;
  netCtx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  drawNetwork();
}
window.addEventListener('resize', resizeNetCanvas);

// Layer positions (x fractions)
const layerX = [0.12, 0.5, 0.88];
// Neuron counts to draw (abbreviated)
const inputShow = 8;  // show 8 of 784
const hiddenShow = 12; // show 12 of 64
const outputShow = 10;

function neuronY(layerIdx, idx, count) {
  const spacing = Math.min(28, (netH - 60) / (count + 1));
  const totalH = spacing * (count - 1);
  const startY = (netH - totalH) / 2;
  return startY + idx * spacing;
}

let animPhase = 0;
let animFrame = null;

function drawNetwork() {
  if (!netW) return;
  netCtx.clearRect(0, 0, netW, netH);

  animPhase += 0.02;

  const x0 = layerX[0] * netW;
  const x1 = layerX[1] * netW;
  const x2 = layerX[2] * netW;

  // Compute positions
  const inputNeurons = [];
  for (let i = 0; i < inputShow; i++) {
    inputNeurons.push({ x: x0, y: neuronY(0, i, inputShow) });
  }
  const hiddenNeurons = [];
  // Pick the 12 most-active hidden neurons for display
  const hiddenIndices = Array.from({ length: 64 }, (_, i) => i);
  hiddenIndices.sort((a, b) => hiddenAct[b] - hiddenAct[a]);
  const topHidden = hiddenIndices.slice(0, hiddenShow);
  topHidden.sort((a, b) => a - b); // sort by index for stable layout
  for (let i = 0; i < hiddenShow; i++) {
    hiddenNeurons.push({
      x: x1,
      y: neuronY(1, i, hiddenShow),
      act: hiddenAct[topHidden[i]] || 0,
      idx: topHidden[i]
    });
  }
  const outputNeurons = [];
  for (let i = 0; i < outputShow; i++) {
    outputNeurons.push({ x: x2, y: neuronY(2, i, outputShow), act: outputAct[i] || 0 });
  }

  // --- Draw connections ---
  // Input -> Hidden
  for (let h = 0; h < hiddenNeurons.length; h++) {
    const hn = hiddenNeurons[h];
    const alpha = Math.min(1, 0.03 + 0.15 * (hn.act / (maxHiddenAct() + 0.001)));
    for (let i = 0; i < inputNeurons.length; i++) {
      const inp = inputNeurons[i];
      netCtx.beginPath();
      netCtx.moveTo(inp.x, inp.y);
      netCtx.lineTo(hn.x, hn.y);
      netCtx.strokeStyle = `rgba(108,99,255,${alpha})`;
      netCtx.lineWidth = 0.5;
      netCtx.stroke();
    }
  }

  // Hidden -> Output
  for (let o = 0; o < outputNeurons.length; o++) {
    const on = outputNeurons[o];
    const alpha = Math.min(1, 0.03 + 0.4 * on.act);
    for (let h = 0; h < hiddenNeurons.length; h++) {
      const hn = hiddenNeurons[h];
      const connAlpha = alpha * Math.min(1, 0.1 + 0.9 * (hn.act / (maxHiddenAct() + 0.001)));
      netCtx.beginPath();
      netCtx.moveTo(hn.x, hn.y);
      netCtx.lineTo(on.x, on.y);
      netCtx.strokeStyle = `rgba(108,99,255,${connAlpha})`;
      netCtx.lineWidth = 0.5 + 1.5 * on.act;
      netCtx.stroke();
    }
  }

  // --- Draw neurons ---
  // Input layer
  for (let i = 0; i < inputNeurons.length; i++) {
    const n = inputNeurons[i];
    drawNeuron(n.x, n.y, 5, 0.3, '#6c63ff');
  }
  // Ellipsis
  const ey = neuronY(0, inputShow, inputShow) + 16;
  netCtx.fillStyle = '#555';
  netCtx.font = '10px sans-serif';
  netCtx.textAlign = 'center';
  netCtx.fillText('... 784', x0, ey);

  // Hidden layer
  const hMax = maxHiddenAct();
  for (let i = 0; i < hiddenNeurons.length; i++) {
    const n = hiddenNeurons[i];
    const intensity = hMax > 0 ? n.act / hMax : 0;
    drawNeuron(n.x, n.y, 6, 0.2 + 0.8 * intensity, '#6c63ff');
  }
  netCtx.fillStyle = '#555';
  netCtx.fillText('64 neurons (ReLU)', x1, neuronY(1, hiddenShow, hiddenShow) + 18);

  // Output layer
  for (let i = 0; i < outputNeurons.length; i++) {
    const n = outputNeurons[i];
    drawNeuron(n.x, n.y, 7, 0.15 + 0.85 * n.act, '#6c63ff');
    netCtx.fillStyle = '#aaa';
    netCtx.font = '10px sans-serif';
    netCtx.textAlign = 'left';
    netCtx.fillText(i, n.x + 12, n.y + 4);
  }
  netCtx.fillStyle = '#555';
  netCtx.textAlign = 'center';
  netCtx.fillText('Softmax', x2, neuronY(2, outputShow, outputShow) + 18);

  // Layer labels
  netCtx.fillStyle = '#666';
  netCtx.font = '11px sans-serif';
  netCtx.textAlign = 'center';
  netCtx.fillText('Input', x0, 16);
  netCtx.fillText('Hidden', x1, 16);
  netCtx.fillText('Output', x2, 16);
}

function maxHiddenAct() {
  let m = 0;
  for (let i = 0; i < 64; i++) if (hiddenAct[i] > m) m = hiddenAct[i];
  return m;
}

function drawNeuron(x, y, r, intensity, color) {
  // Glow
  const glow = netCtx.createRadialGradient(x, y, 0, x, y, r * 3);
  glow.addColorStop(0, `rgba(108,99,255,${intensity * 0.4})`);
  glow.addColorStop(1, 'rgba(108,99,255,0)');
  netCtx.beginPath();
  netCtx.arc(x, y, r * 3, 0, Math.PI * 2);
  netCtx.fillStyle = glow;
  netCtx.fill();

  // Body
  netCtx.beginPath();
  netCtx.arc(x, y, r, 0, Math.PI * 2);
  const bright = Math.round(60 + 195 * intensity);
  netCtx.fillStyle = `rgb(${bright}, ${Math.round(bright * 0.9)}, 255)`;
  netCtx.fill();
  netCtx.strokeStyle = `rgba(108,99,255,${0.4 + 0.6 * intensity})`;
  netCtx.lineWidth = 1.2;
  netCtx.stroke();
}

// =====================================================================
//  Gallery — Pre-drawn digit examples
// =====================================================================
const galleryDigits = [
  // Each is a 28x28 "drawing" encoded as simple stroke coords on 280x280
  { label: '1', strokes: [[{x:140,y:40},{x:130,y:80},{x:135,y:140},{x:138,y:200},{x:140,y:250}]] },
  { label: '0', strokes: [[{x:140,y:40},{x:100,y:60},{x:80,y:110},{x:80,y:170},{x:100,y:220},{x:140,y:245},{x:180,y:220},{x:200,y:170},{x:200,y:110},{x:180,y:60},{x:140,y:40}]] },
  { label: '7', strokes: [[{x:80,y:50},{x:140,y:50},{x:200,y:50}],[{x:200,y:50},{x:170,y:120},{x:150,y:190},{x:135,y:250}]] },
  { label: '4', strokes: [[{x:170,y:40},{x:100,y:170},{x:200,y:170}],[{x:170,y:40},{x:170,y:250}]] },
  { label: '3', strokes: [[{x:90,y:60},{x:140,y:40},{x:190,y:60},{x:190,y:110},{x:140,y:140},{x:190,y:170},{x:190,y:220},{x:140,y:245},{x:90,y:225}]] },
];

const galleryEl = document.getElementById('gallery');
galleryDigits.forEach((digit, di) => {
  const c = document.createElement('canvas');
  c.width = 280; c.height = 280;
  c.style.width = '48px'; c.style.height = '48px';
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, 280, 280);
  ctx.strokeStyle = '#fff';
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.lineWidth = 20;
  digit.strokes.forEach(stroke => {
    if (stroke.length < 2) return;
    ctx.beginPath();
    ctx.moveTo(stroke[0].x, stroke[0].y);
    for (let i = 1; i < stroke.length; i++) ctx.lineTo(stroke[i].x, stroke[i].y);
    ctx.stroke();
  });

  c.title = `Load digit ${digit.label}`;
  c.addEventListener('click', () => {
    // Copy to draw canvas
    drawCtx.fillStyle = '#000';
    drawCtx.fillRect(0, 0, 280, 280);
    drawCtx.drawImage(c, 0, 0);
    hasDrawn = true;
    classify();
  });
  galleryEl.appendChild(c);
});

// =====================================================================
//  Init — train model on page load
// =====================================================================
outputAct.fill(0.1);
updateProbBars();
document.getElementById('predictedLabel').textContent = 'Training...';

trainModel().then(() => {
  resizeNetCanvas();
  outputAct.fill(0.1);
  updateProbBars();
  document.getElementById('predictedLabel').textContent = 'Draw something!';
  drawNetwork();
}).catch(err => {
  document.getElementById('trainStatus').textContent = 'Error: ' + err.message;
  console.error(err);
});
</script>
