<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Tracker — Physics Sandbox</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a1a2e;
  color: #e0e0e0;
  font-family: 'Segoe UI', system-ui, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
  overflow-x: hidden;
}

.container {
  width: 100%;
  max-width: 960px;
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(108,99,255,0.1);
  background: #16213e;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Title bar */
.title-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  background: #0f1a30;
  border-bottom: 1px solid rgba(108,99,255,0.2);
}
.title-bar h1 {
  font-size: 1.1rem;
  font-weight: 600;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 8px;
}
.title-bar h1 span.accent { color: #6c63ff; }
.title-bar .subtitle {
  font-size: 0.75rem;
  color: #888;
}

/* Main area */
.main {
  display: flex;
  flex: 1;
  min-height: 520px;
}

/* Canvas wrapper */
.canvas-wrap {
  flex: 1;
  position: relative;
  background: #0d1526;
  cursor: crosshair;
  min-height: 500px;
}
.canvas-wrap canvas {
  display: block;
  width: 100%;
  height: 100%;
}
.canvas-hint {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.7rem;
  color: #555;
  pointer-events: none;
  transition: opacity 0.5s;
}

/* Sidebar */
.sidebar {
  width: 240px;
  min-width: 240px;
  background: #0f1a30;
  border-left: 1px solid rgba(108,99,255,0.15);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

.panel {
  padding: 14px 16px;
  border-bottom: 1px solid rgba(108,99,255,0.1);
}
.panel-title {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: #6c63ff;
  margin-bottom: 10px;
  font-weight: 600;
}

/* Stats */
.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
  font-size: 0.8rem;
}
.stat-row .label { color: #888; }
.stat-row .value { color: #fff; font-weight: 600; font-variant-numeric: tabular-nums; }

/* Heatmap */
.heatmap-wrap {
  margin-top: 8px;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid rgba(108,99,255,0.15);
}
.heatmap-wrap canvas {
  display: block;
  width: 100%;
  height: 80px;
  image-rendering: pixelated;
}

/* Controls */
.control-group {
  margin-bottom: 10px;
}
.control-group label {
  display: flex;
  justify-content: space-between;
  font-size: 0.75rem;
  color: #aaa;
  margin-bottom: 4px;
}
.control-group label .val { color: #6c63ff; font-weight: 600; }

input[type="range"] {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  border-radius: 2px;
  background: #1a1a2e;
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #6c63ff;
  cursor: pointer;
  border: 2px solid #0f1a30;
}
input[type="range"]::-moz-range-thumb {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #6c63ff;
  cursor: pointer;
  border: 2px solid #0f1a30;
}

/* Toggle switches */
.toggle-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 0.78rem;
  color: #aaa;
}
.toggle {
  width: 36px;
  height: 20px;
  background: #1a1a2e;
  border-radius: 10px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
  border: 1px solid rgba(108,99,255,0.2);
}
.toggle.on { background: #6c63ff; }
.toggle::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #fff;
  transition: transform 0.2s;
}
.toggle.on::after { transform: translateX(16px); }

/* Buttons */
.btn-row {
  display: flex;
  gap: 6px;
  margin-top: 6px;
}
.btn {
  flex: 1;
  padding: 7px 0;
  border: none;
  border-radius: 6px;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  font-family: inherit;
}
.btn:active { transform: scale(0.96); }
.btn-primary {
  background: #6c63ff;
  color: #fff;
}
.btn-primary:hover { background: #5a52e0; }
.btn-danger {
  background: #ff4757;
  color: #fff;
}
.btn-danger:hover { background: #e0394a; }

/* Occlusion wall indicator */
.wall-hint {
  position: absolute;
  top: 8px;
  left: 8px;
  font-size: 0.65rem;
  color: #555;
  pointer-events: none;
}

/* Responsive */
@media (max-width: 700px) {
  body { padding: 10px; }
  .main { flex-direction: column; }
  .sidebar {
    width: 100%;
    min-width: 0;
    flex-direction: row;
    flex-wrap: wrap;
    border-left: none;
    border-top: 1px solid rgba(108,99,255,0.15);
  }
  .panel { flex: 1; min-width: 180px; }
  .canvas-wrap { min-height: 350px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="title-bar">
    <h1><span class="accent">&#9673;</span> Particle Tracker <span class="accent">|</span> Physics Sandbox</h1>
    <div class="subtitle">Click canvas to spawn particles</div>
  </div>

  <div class="main">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="simCanvas"></canvas>
      <div class="wall-hint">Drag the gray wall to test occlusion</div>
      <div class="canvas-hint" id="canvasHint">Click anywhere to add a particle</div>
    </div>

    <div class="sidebar">
      <!-- Stats -->
      <div class="panel">
        <div class="panel-title">Dashboard</div>
        <div class="stat-row"><span class="label">Objects</span><span class="value" id="statCount">0</span></div>
        <div class="stat-row"><span class="label">Avg Velocity</span><span class="value" id="statVel">0.0</span></div>
        <div class="stat-row"><span class="label">FPS</span><span class="value" id="statFps">0</span></div>
        <div class="heatmap-wrap">
          <canvas id="heatmapCanvas"></canvas>
        </div>
      </div>

      <!-- Controls -->
      <div class="panel">
        <div class="panel-title">Controls</div>

        <div class="control-group">
          <label>Gravity <span class="val" id="gravVal">0.30</span></label>
          <input type="range" id="gravSlider" min="0" max="2" step="0.01" value="0.30">
        </div>

        <div class="control-group">
          <label>Friction <span class="val" id="fricVal">0.99</span></label>
          <input type="range" id="fricSlider" min="0.9" max="1" step="0.001" value="0.990">
        </div>

        <div class="toggle-row">
          Detection boxes
          <div class="toggle on" id="toggleDetection"></div>
        </div>
        <div class="toggle-row">
          Trajectories
          <div class="toggle on" id="toggleTrajectories"></div>
        </div>

        <div class="btn-row">
          <button class="btn btn-primary" id="btnPause">Pause</button>
          <button class="btn btn-danger" id="btnClear">Clear</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  // --- Setup ---
  const canvas = document.getElementById('simCanvas');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('canvasWrap');
  const heatCanvas = document.getElementById('heatmapCanvas');
  const heatCtx = heatCanvas.getContext('2d');

  let W = 0, H = 0;
  const HM_W = 80, HM_H = 40;
  heatCanvas.width = HM_W;
  heatCanvas.height = HM_H;
  const heatmap = new Float32Array(HM_W * HM_H);

  function resize() {
    const rect = wrap.getBoundingClientRect();
    W = Math.floor(rect.width);
    H = Math.floor(rect.height);
    canvas.width = W;
    canvas.height = H;
  }
  resize();
  window.addEventListener('resize', resize);

  // --- State ---
  let particles = [];
  let nextId = 1;
  let gravity = 0.30;
  let friction = 0.990;
  let showDetection = true;
  let showTrajectories = true;
  let paused = false;
  let frameCount = 0;
  let fps = 0;
  let lastFpsTime = performance.now();
  let fpsFrames = 0;

  // Occlusion wall
  const wall = { x: 0, y: 0, w: 100, h: 140, dragging: false, ox: 0, oy: 0 };

  function initWallPosition() {
    wall.x = W * 0.55;
    wall.y = H * 0.35;
  }

  // Colors palette
  const COLORS = [
    '#6c63ff', '#ff6b6b', '#feca57', '#48dbfb',
    '#ff9ff3', '#54a0ff', '#5f27cd', '#01a3a4',
    '#f368e0', '#ff9f43', '#00d2d3', '#c44569'
  ];

  // --- Particle class ---
  class Particle {
    constructor(x, y) {
      this.id = nextId++;
      this.x = x;
      this.y = y;
      this.r = 10 + Math.random() * 15;
      this.vx = (Math.random() - 0.5) * 8;
      this.vy = (Math.random() - 0.5) * 6 - 2;
      this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.trail = [];
      this.maxTrail = 50;
      this.confidence = 0.85 + Math.random() * 0.14;
      this.detectMiss = 0; // frames to hide detection
      this.spawnTime = performance.now();
      this.highlighted = true; // ID assignment animation
    }

    update() {
      this.vy += gravity;
      this.vx *= friction;
      this.vy *= friction;
      this.x += this.vx;
      this.y += this.vy;

      // Boundary collisions
      if (this.x - this.r < 0) { this.x = this.r; this.vx = Math.abs(this.vx) * 0.9; }
      if (this.x + this.r > W) { this.x = W - this.r; this.vx = -Math.abs(this.vx) * 0.9; }
      if (this.y - this.r < 0) { this.y = this.r; this.vy = Math.abs(this.vy) * 0.9; }
      if (this.y + this.r > H) { this.y = H - this.r; this.vy = -Math.abs(this.vy) * 0.9; }

      // Trail
      this.trail.push({ x: this.x, y: this.y });
      if (this.trail.length > this.maxTrail) this.trail.shift();

      // Detection flicker
      if (this.detectMiss > 0) {
        this.detectMiss--;
      } else if (Math.random() < 0.03) {
        this.detectMiss = 1 + Math.floor(Math.random() * 2);
      }

      // Jitter confidence
      this.confidence = Math.min(0.99, Math.max(0.85, this.confidence + (Math.random() - 0.5) * 0.02));

      // Heatmap
      const hx = Math.floor((this.x / W) * HM_W);
      const hy = Math.floor((this.y / H) * HM_H);
      if (hx >= 0 && hx < HM_W && hy >= 0 && hy < HM_H) {
        heatmap[hy * HM_W + hx] += 0.15;
      }

      // Fade highlight
      if (performance.now() - this.spawnTime > 600) this.highlighted = false;
    }

    speed() {
      return Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    }

    isOccluded() {
      return (
        this.x > wall.x && this.x < wall.x + wall.w &&
        this.y > wall.y && this.y < wall.y + wall.h
      );
    }

    draw() {
      const occluded = this.isOccluded();

      // Trajectory
      if (showTrajectories && this.trail.length > 1) {
        ctx.beginPath();
        for (let i = 0; i < this.trail.length; i++) {
          const alpha = i / this.trail.length * 0.6;
          ctx.strokeStyle = this.color + hexAlpha(alpha);
          ctx.lineWidth = 1.5;
          if (i === 0) {
            ctx.moveTo(this.trail[i].x, this.trail[i].y);
          } else {
            ctx.lineTo(this.trail[i].x, this.trail[i].y);
          }
        }
        ctx.stroke();
      }

      if (occluded) {
        // Draw tracking ID even when occluded (demonstrates persistence)
        ctx.font = 'bold 10px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = this.color + '88';
        ctx.fillText(`ID:${this.id}`, this.x - this.r, this.y - this.r - 18);
        ctx.fillStyle = '#888';
        ctx.font = '9px "Segoe UI", system-ui, sans-serif';
        ctx.fillText('(occluded)', this.x - this.r, this.y - this.r - 6);
        return;
      }

      // Particle body
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      const grad = ctx.createRadialGradient(this.x - this.r * 0.3, this.y - this.r * 0.3, 0, this.x, this.y, this.r);
      grad.addColorStop(0, lighten(this.color, 40));
      grad.addColorStop(1, this.color);
      ctx.fillStyle = grad;
      ctx.fill();

      // Highlight ring on spawn
      if (this.highlighted) {
        const age = performance.now() - this.spawnTime;
        const a = 1 - age / 600;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r + 8 + (1 - a) * 10, 0, Math.PI * 2);
        ctx.strokeStyle = this.color + hexAlpha(a * 0.6);
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      // Detection box
      if (showDetection && this.detectMiss === 0) {
        const pad = 8;
        const bx = this.x - this.r - pad;
        const by = this.y - this.r - pad;
        const bw = (this.r + pad) * 2;
        const bh = (this.r + pad) * 2;
        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = this.color + 'bb';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(bx, by, bw, bh);
        ctx.setLineDash([]);

        // Confidence label
        ctx.font = '9px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = this.color;
        ctx.fillText(this.confidence.toFixed(2), bx, by - 3);
      }

      // Tracking ID
      ctx.font = 'bold 11px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = '#fff';
      const idText = `ID:${this.id}`;
      const tw = ctx.measureText(idText).width;
      const lx = this.x - tw / 2;
      const ly = this.y - this.r - (showDetection ? 22 : 14);
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(lx - 3, ly - 10, tw + 6, 13);
      ctx.fillStyle = this.color;
      ctx.fillText(idText, lx, ly);
    }
  }

  // --- Particle-particle collision ---
  function collide(a, b) {
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const minDist = a.r + b.r;
    if (dist < minDist && dist > 0) {
      const nx = dx / dist;
      const ny = dy / dist;
      const relVx = a.vx - b.vx;
      const relVy = a.vy - b.vy;
      const relVn = relVx * nx + relVy * ny;
      if (relVn > 0) {
        const massA = a.r * a.r;
        const massB = b.r * b.r;
        const impulse = (2 * relVn) / (massA + massB);
        a.vx -= impulse * massB * nx;
        a.vy -= impulse * massB * ny;
        b.vx += impulse * massA * nx;
        b.vy += impulse * massA * ny;
      }
      // Separate overlap
      const overlap = (minDist - dist) / 2;
      a.x -= overlap * nx;
      a.y -= overlap * ny;
      b.x += overlap * nx;
      b.y += overlap * ny;
    }
  }

  // --- Helpers ---
  function hexAlpha(a) {
    return Math.round(Math.max(0, Math.min(1, a)) * 255).toString(16).padStart(2, '0');
  }

  function lighten(hex, pct) {
    let r = parseInt(hex.slice(1, 3), 16);
    let g = parseInt(hex.slice(3, 5), 16);
    let b = parseInt(hex.slice(5, 7), 16);
    r = Math.min(255, r + pct);
    g = Math.min(255, g + pct);
    b = Math.min(255, b + pct);
    return `rgb(${r},${g},${b})`;
  }

  // --- Wall drawing & interaction ---
  function drawWall() {
    ctx.fillStyle = 'rgba(80,80,100,0.7)';
    ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
    ctx.strokeStyle = 'rgba(120,120,150,0.5)';
    ctx.lineWidth = 1;
    ctx.strokeRect(wall.x, wall.y, wall.w, wall.h);
    ctx.font = '9px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#aaa';
    ctx.textAlign = 'center';
    ctx.fillText('OCCLUSION', wall.x + wall.w / 2, wall.y + wall.h / 2 - 4);
    ctx.fillText('WALL', wall.x + wall.w / 2, wall.y + wall.h / 2 + 8);
    ctx.textAlign = 'left';
  }

  // --- Heatmap rendering ---
  function drawHeatmap() {
    const imgData = heatCtx.createImageData(HM_W, HM_H);
    let maxVal = 1;
    for (let i = 0; i < heatmap.length; i++) {
      if (heatmap[i] > maxVal) maxVal = heatmap[i];
    }
    for (let i = 0; i < heatmap.length; i++) {
      const v = heatmap[i] / maxVal;
      const idx = i * 4;
      // Warm color ramp: black -> purple -> orange -> yellow
      if (v < 0.33) {
        const t = v / 0.33;
        imgData.data[idx]     = Math.floor(60 * t);
        imgData.data[idx + 1] = 0;
        imgData.data[idx + 2] = Math.floor(120 * t);
      } else if (v < 0.66) {
        const t = (v - 0.33) / 0.33;
        imgData.data[idx]     = 60 + Math.floor(195 * t);
        imgData.data[idx + 1] = Math.floor(100 * t);
        imgData.data[idx + 2] = Math.floor(120 * (1 - t));
      } else {
        const t = (v - 0.66) / 0.34;
        imgData.data[idx]     = 255;
        imgData.data[idx + 1] = 100 + Math.floor(155 * t);
        imgData.data[idx + 2] = Math.floor(50 * t);
      }
      imgData.data[idx + 3] = v > 0.01 ? 200 + Math.floor(55 * v) : 30;
    }
    heatCtx.putImageData(imgData, 0, 0);
    // Slow decay
    for (let i = 0; i < heatmap.length; i++) {
      heatmap[i] *= 0.998;
    }
  }

  // --- Main loop ---
  function loop() {
    requestAnimationFrame(loop);
    if (paused) return;

    frameCount++;
    fpsFrames++;
    const now = performance.now();
    if (now - lastFpsTime >= 1000) {
      fps = fpsFrames;
      fpsFrames = 0;
      lastFpsTime = now;
    }

    // Clear
    ctx.clearRect(0, 0, W, H);

    // Faint grid
    ctx.strokeStyle = 'rgba(108,99,255,0.04)';
    ctx.lineWidth = 1;
    const step = 40;
    for (let x = step; x < W; x += step) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    for (let y = step; y < H; y += step) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

    // Update & collide
    for (let i = 0; i < particles.length; i++) {
      particles[i].update();
      for (let j = i + 1; j < particles.length; j++) {
        collide(particles[i], particles[j]);
      }
    }

    // Draw wall behind particles
    drawWall();

    // Draw particles
    for (const p of particles) {
      p.draw();
    }

    // Stats
    document.getElementById('statCount').textContent = particles.length;
    if (particles.length > 0) {
      const avgV = particles.reduce((s, p) => s + p.speed(), 0) / particles.length;
      document.getElementById('statVel').textContent = avgV.toFixed(1);
    } else {
      document.getElementById('statVel').textContent = '0.0';
    }
    document.getElementById('statFps').textContent = fps;

    // Heatmap (every 4 frames)
    if (frameCount % 4 === 0) drawHeatmap();
  }

  // --- Spawn particles ---
  function spawn(x, y) {
    const p = new Particle(x, y);
    particles.push(p);
    // Fade hint after first manual click
    const hint = document.getElementById('canvasHint');
    if (hint) hint.style.opacity = '0';
  }

  // Pre-spawn 5 particles
  function preSpawn() {
    initWallPosition();
    for (let i = 0; i < 5; i++) {
      const margin = 40;
      spawn(
        margin + Math.random() * (W - margin * 2),
        margin + Math.random() * (H / 2)
      );
    }
  }

  // --- Events ---
  canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
    const my = (e.clientY - rect.top) * (canvas.height / rect.height);

    // Check wall drag
    if (mx >= wall.x && mx <= wall.x + wall.w && my >= wall.y && my <= wall.y + wall.h) {
      wall.dragging = true;
      wall.ox = mx - wall.x;
      wall.oy = my - wall.y;
      canvas.style.cursor = 'grabbing';
      return;
    }
    spawn(mx, my);
  });

  canvas.addEventListener('mousemove', (e) => {
    if (!wall.dragging) return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
    const my = (e.clientY - rect.top) * (canvas.height / rect.height);
    wall.x = mx - wall.ox;
    wall.y = my - wall.oy;
  });

  canvas.addEventListener('mouseup', () => {
    wall.dragging = false;
    canvas.style.cursor = 'crosshair';
  });
  canvas.addEventListener('mouseleave', () => {
    wall.dragging = false;
    canvas.style.cursor = 'crosshair';
  });

  // Touch support
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const mx = (touch.clientX - rect.left) * (canvas.width / rect.width);
    const my = (touch.clientY - rect.top) * (canvas.height / rect.height);
    if (mx >= wall.x && mx <= wall.x + wall.w && my >= wall.y && my <= wall.y + wall.h) {
      wall.dragging = true;
      wall.ox = mx - wall.x;
      wall.oy = my - wall.y;
      return;
    }
    spawn(mx, my);
  }, { passive: false });
  canvas.addEventListener('touchmove', (e) => {
    if (!wall.dragging) return;
    e.preventDefault();
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    wall.x = (touch.clientX - rect.left) * (canvas.width / rect.width) - wall.ox;
    wall.y = (touch.clientY - rect.top) * (canvas.height / rect.height) - wall.oy;
  }, { passive: false });
  canvas.addEventListener('touchend', () => { wall.dragging = false; });

  // Sliders
  const gravSlider = document.getElementById('gravSlider');
  const fricSlider = document.getElementById('fricSlider');
  gravSlider.addEventListener('input', () => {
    gravity = parseFloat(gravSlider.value);
    document.getElementById('gravVal').textContent = gravity.toFixed(2);
  });
  fricSlider.addEventListener('input', () => {
    friction = parseFloat(fricSlider.value);
    document.getElementById('fricVal').textContent = friction.toFixed(3);
  });

  // Toggles
  function setupToggle(id, initialState, cb) {
    const el = document.getElementById(id);
    let state = initialState;
    if (state) el.classList.add('on'); else el.classList.remove('on');
    el.addEventListener('click', () => {
      state = !state;
      el.classList.toggle('on', state);
      cb(state);
    });
  }
  setupToggle('toggleDetection', true, v => showDetection = v);
  setupToggle('toggleTrajectories', true, v => showTrajectories = v);

  // Buttons
  document.getElementById('btnPause').addEventListener('click', function() {
    paused = !paused;
    this.textContent = paused ? 'Resume' : 'Pause';
  });
  document.getElementById('btnClear').addEventListener('click', () => {
    particles = [];
    nextId = 1;
    heatmap.fill(0);
    const hint = document.getElementById('canvasHint');
    if (hint) hint.style.opacity = '1';
  });

  // --- Init ---
  preSpawn();
  loop();
})();
</script>
</body>
</html>
